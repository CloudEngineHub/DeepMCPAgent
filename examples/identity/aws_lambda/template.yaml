# AWS SAM template — an agent with a verifiable AWS IAM identity on Lambda.
#
# Deploy: sam build && sam deploy --guided
#
# The function derives its identity from its IAM execution role (STS
# GetWebIdentityToken). No identity secrets are stored. A model key (e.g.
# ANTHROPIC_API_KEY) is only needed if the handler invokes an LLM.

AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Promptise agent with a verifiable AWS identity (Lambda)

Resources:
  AgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: promptise-identity-agent
      Runtime: python3.12
      Handler: handler.handler
      CodeUri: .
      Timeout: 60
      MemorySize: 512
      # The execution role IS the agent's identity. Attach any additional
      # policies the agent's tools need here.
      Policies:
        - AWSLambdaBasicExecutionRole

Outputs:
  AgentFunctionArn:
    Description: The deployed function ARN.
    Value: !GetAtt AgentFunction.Arn
